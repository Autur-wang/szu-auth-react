<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找回密码 — 深大体育预约</title>
  <style>
    :root { --red:#C1272D; --blue:#1A4189; --bg:#f4f6fb; --card:#fff; --border:#e0e5f0; --text:#1a1a2e; --muted:#6b7280; --success:#16a34a; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); min-height:100vh; display:flex; flex-direction:column; }
    header { background:linear-gradient(135deg,var(--blue) 0%,#0d2d6b 100%); padding:0 2rem; height:64px; display:flex; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,.2); }
    .logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
    .logo-emblem { width:40px; height:40px; background:var(--red); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:1.4rem; }
    .logo-text .main { font-size:1rem; font-weight:700; color:#fff; letter-spacing:1px; }
    .logo-text .sub { font-size:.7rem; color:rgba(255,255,255,.7); }
    main { flex:1; display:flex; flex-direction:column; align-items:center; padding:3rem 1rem; }
    h1 { font-size:1.6rem; font-weight:700; color:var(--text); margin-bottom:.4rem; text-align:center; }
    .subtitle { color:var(--muted); font-size:.9rem; margin-bottom:2.5rem; text-align:center; }
    .stepper { display:flex; align-items:center; max-width:420px; width:100%; margin-bottom:2.5rem; }
    .step-item { display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; position:relative; }
    .step-item:not(:last-child)::after { content:''; position:absolute; top:18px; left:calc(50% + 18px); right:calc(-50% + 18px); height:2px; background:var(--border); z-index:0; transition:background .4s; }
    .step-item.done:not(:last-child)::after { background:var(--success); }
    .step-circle { width:36px; height:36px; border-radius:50%; border:2px solid var(--border); background:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.85rem; color:var(--muted); position:relative; z-index:1; transition:all .3s; }
    .step-item.active .step-circle { border-color:var(--blue); background:var(--blue); color:#fff; }
    .step-item.done .step-circle { border-color:var(--success); background:var(--success); color:#fff; }
    .step-label { font-size:.75rem; color:var(--muted); white-space:nowrap; }
    .step-item.active .step-label { color:var(--blue); font-weight:600; }
    .step-item.done .step-label { color:var(--success); }
    .card { background:var(--card); border-radius:16px; box-shadow:0 4px 24px rgba(26,65,137,.1); padding:2.5rem; width:100%; max-width:440px; }
    .panel { display:none; }
    .panel.active { display:block; }
    .panel-title { font-size:1.2rem; font-weight:700; color:var(--text); margin-bottom:.4rem; }
    .panel-desc { font-size:.85rem; color:var(--muted); margin-bottom:1.8rem; line-height:1.6; }
    .field-group { margin-bottom:1.2rem; }
    label { display:block; font-size:.82rem; font-weight:600; color:#374151; margin-bottom:6px; }
    label .req { color:var(--red); }
    input[type=text],input[type=tel],input[type=password] { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:8px; font-size:.95rem; color:var(--text); background:#fafbfc; outline:none; transition:border-color .2s,box-shadow .2s; }
    input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(26,65,137,.12); background:#fff; }
    input.error { border-color:var(--red); }
    .field-err { font-size:.78rem; color:var(--red); margin-top:4px; display:none; }
    .field-err.show { display:block; }
    .code-row { display:flex; gap:10px; }
    .code-row input { flex:1; }
    .btn-code { padding:11px 14px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-size:.82rem; font-weight:600; cursor:pointer; white-space:nowrap; min-width:96px; transition:background .2s; }
    .btn-code:hover { background:#2a5bb5; }
    .btn-code:disabled { background:#9ca3af; cursor:not-allowed; }
    .btn-primary { width:100%; padding:13px; background:linear-gradient(135deg,var(--red),#a01f23); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; letter-spacing:1px; transition:opacity .2s; }
    .btn-blue { background:linear-gradient(135deg,var(--blue),#0d2d6b); }
    .btn-primary:hover { opacity:.92; }
    .pwd-strength { display:flex; gap:4px; margin-top:6px; align-items:center; }
    .pwd-bar { flex:1; height:4px; border-radius:2px; background:var(--border); transition:background .3s; }
    .pwd-lbl { font-size:.74rem; color:var(--muted); margin-left:6px; min-width:24px; }
    .login-link { text-align:center; margin-top:1.4rem; font-size:.85rem; color:var(--muted); }
    .login-link a { color:var(--blue); text-decoration:none; font-weight:600; }
    .success-panel { text-align:center; padding:1rem 0; }
    .success-icon { width:80px; height:80px; background:linear-gradient(135deg,#16a34a,#15803d); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2.4rem; margin:0 auto 1.5rem; box-shadow:0 8px 24px rgba(22,163,74,.3); animation:pop .5s ease; }
    @keyframes pop { 0%{transform:scale(0);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
    .success-title { font-size:1.4rem; font-weight:800; margin-bottom:.5rem; }
    .success-desc { font-size:.9rem; color:var(--muted); margin-bottom:2rem; line-height:1.7; }
    .cd { font-size:.82rem; color:var(--muted); margin-top:1rem; }
    .cd span { color:var(--blue); font-weight:700; }
    footer { text-align:center; padding:1.5rem; font-size:.78rem; color:var(--muted); border-top:1px solid var(--border); }
  </style>
</head>
<body>
<header>
  <a href="index.html" class="logo">
    <div class="logo-emblem">🏟️</div>
    <div class="logo-text"><div class="main">深大体育预约</div><div class="sub">SZU Sports Booking</div></div>
  </a>
</header>
<main>
  <h1>找回密码</h1>
  <p class="subtitle">通过注册手机号验证身份并重置密码</p>
  <div class="stepper" id="stepper">
    <div class="step-item active" id="si1"><div class="step-circle" id="sc1">1</div><div class="step-label">验证手机号</div></div>
    <div class="step-item" id="si2"><div class="step-circle" id="sc2">2</div><div class="step-label">重置密码</div></div>
    <div class="step-item" id="si3"><div class="step-circle" id="sc3">3</div><div class="step-label">完成</div></div>
  </div>
  <div class="card">
    <!-- PANEL 1 -->
    <div class="panel active" id="p1">
      <div class="panel-title">验证手机号</div>
      <p class="panel-desc">请输入注册时使用的手机号，我们将发送验证码。</p>
      <div class="field-group">
        <label>手机号 <span class="req">*</span></label>
        <div class="code-row">
          <input type="tel" id="phone" placeholder="请输入11位手机号" maxlength="11" />
          <button class="btn-code" id="btnCode" onclick="sendCode()">发送验证码</button>
        </div>
        <div class="field-err" id="err-phone">请输入正确的手机号</div>
      </div>
      <div class="field-group">
        <label>验证码 <span class="req">*</span></label>
        <input type="text" id="code" placeholder="请输入6位验证码" maxlength="6" />
        <div class="field-err" id="err-code">验证码错误，请重试</div>
      </div>
      <button class="btn-primary btn-blue" onclick="goP2()">下一步</button>
      <div class="login-link">想起密码了？<a href="index.html">返回登录</a></div>
    </div>
    <!-- PANEL 2 -->
    <div class="panel" id="p2">
      <div class="panel-title">重置密码</div>
      <p class="panel-desc">请设置您的新密码，完成后可使用新密码登录。</p>
      <div class="field-group">
        <label>新密码 <span class="req">*</span></label>
        <input type="password" id="npwd" placeholder="8-20位，含字母和数字" oninput="checkStr(this.value)" />
        <div class="pwd-strength"><div class="pwd-bar" id="b1"></div><div class="pwd-bar" id="b2"></div><div class="pwd-bar" id="b3"></div><div class="pwd-lbl" id="plbl"></div></div>
        <div class="field-err" id="err-npwd">密码至少8位，需包含字母和数字</div>
      </div>
      <div class="field-group">
        <label>确认新密码 <span class="req">*</span></label>
        <input type="password" id="npwd2" placeholder="请再次输入新密码" />
        <div class="field-err" id="err-npwd2">两次密码不一致</div>
      </div>
      <button class="btn-primary" onclick="goP3()">确认重置密码</button>
      <div style="text-align:center;margin-top:12px;"><a href="#" onclick="setStep(1)" style="font-size:.83rem;color:var(--muted);text-decoration:none;">← 返回上一步</a></div>
    </div>
    <!-- PANEL 3 -->
    <div class="panel" id="p3">
      <div class="success-panel">
        <div class="success-icon">🔑</div>
        <div class="success-title">密码重置成功！</div>
        <p class="success-desc">您的密码已更新，请使用新密码登录。</p>
        <button class="btn-primary btn-blue" onclick="window.location.href='index.html'">返回登录页</button>
        <p class="cd"><span id="cd">5</span> 秒后自动跳转…</p>
      </div>
    </div>
  </div>
</main>
<footer>深圳大学体育预约系统 · Demo · © 2025 SZU Sports</footer>
<script>
  function sendCode(){
    const ph=document.getElementById('phone').value.trim();
    if(!/^1[3-9]\d{9}$/.test(ph)){showE('err-phone','phone');return;}
    clearE('err-phone','phone');
    const btn=document.getElementById('btnCode'); let s=60;
    btn.disabled=true; btn.textContent=s+'s后重发';
    const t=setInterval(()=>{s--;btn.textContent=s+'s后重发';if(s<=0){clearInterval(t);btn.disabled=false;btn.textContent='重新发送';}},1000);
    toast('验证码已发送（Demo: 输入 888888）');
  }
  function checkStr(v){
    ['b1','b2','b3'].forEach(id=>document.getElementById(id).style.background='#e5e7eb');
    const lbl=document.getElementById('plbl');
    if(!v){lbl.textContent='';return;}
    let sc=0;
    if(v.length>=8)sc++;
    if(/[a-zA-Z]/.test(v)&&/\d/.test(v))sc++;
    if(v.length>=12&&/[!@#$%^&*]/.test(v))sc++;
    const c=['#ef4444','#f59e0b','#16a34a'],l=['弱','中','强'];
    for(let i=0;i<sc;i++)document.getElementById(['b1','b2','b3'][i]).style.background=c[sc-1];
    lbl.textContent=l[sc-1]||''; lbl.style.color=c[sc-1]||'#9ca3af';
  }
  function goP2(){
    const ph=document.getElementById('phone').value.trim();
    const co=document.getElementById('code').value.trim();
    if(!/^1[3-9]\d{9}$/.test(ph)){showE('err-phone','phone');return;}clearE('err-phone','phone');
    if(co!=='888888'){showE('err-code','code');return;}clearE('err-code','code');
    setStep(2);
  }
  function goP3(){
    const p1=document.getElementById('npwd').value;
    const p2=document.getElementById('npwd2').value;
    if(!/(?=.*[a-zA-Z])(?=.*\d).{8,}/.test(p1)){showE('err-npwd','npwd');return;}clearE('err-npwd','npwd');
    if(p1!==p2){showE('err-npwd2','npwd2');return;}clearE('err-npwd2','npwd2');
    setStep(3);
    let s=5; const el=document.getElementById('cd');
    const t=setInterval(()=>{s--;el.textContent=s;if(s<=0){clearInterval(t);window.location.href='index.html';}},1000);
  }
  function setStep(n){
    for(let i=1;i<=3;i++){
      const si=document.getElementById('si'+i),sc=document.getElementById('sc'+i),p=document.getElementById('p'+i);
      si.classList.remove('active','done'); p.classList.remove('active');
      if(i<n){si.classList.add('done');sc.textContent='✓';}
      else if(i===n){si.classList.add('active');sc.textContent=i;p.classList.add('active');}
      else sc.textContent=i;
    }
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function showE(eid,iid){document.getElementById(eid).classList.add('show');document.getElementById(iid).classList.add('error');}
  function clearE(eid,iid){document.getElementById(eid).classList.remove('show');document.getElementById(iid).classList.remove('error');}
  function toast(m){const t=document.createElement('div');t.textContent=m;Object.assign(t.style,{position:'fixed',bottom:'32px',left:'50%',transform:'translateX(-50%)',background:'#1f2937',color:'#fff',padding:'10px 20px',borderRadius:'8px',fontSize:'.85rem',zIndex:'9999',boxShadow:'0 4px 16px rgba(0,0,0,.3)'});document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
</script>
</body>
</html>
