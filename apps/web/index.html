<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>深大体育 · 登录 / 注册（animal-crossing-ui 真实组件）</title>
</head>
<body>
<!-- SVG filter：Liquid Glass 液态位移 -->
<svg width="0" height="0" style="position:absolute; overflow:hidden;" aria-hidden="true">
  <defs>
    <filter id="liquid-glass" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018" numOctaves="2" seed="7" result="turb" />
      <feGaussianBlur in="turb" stdDeviation="1.6" result="soft" />
      <feDisplacementMap in="SourceGraphic" in2="soft" scale="14" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
</svg>

<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
